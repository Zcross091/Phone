name: Launch Temporary Cloud Phone (Emulator)

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  run-phone:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # Kills the job after 4 hours

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install and Configure Ngrok
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        sudo apt-get install -y jq

    - name: Launch Emulator and Connect Tunnel
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30 # Android 11
        target: default
        arch: x86_64
        profile: Nexus 6 # Optional: Defines screen size and hardware profile
        script: |
          echo "Emulator booted successfully!"
          
          # Start Ngrok in the background targeting the default ADB port (5555)
          ngrok tcp 5555 --log=stdout &
          sleep 5
          
          # Print the connection URL
          echo "================================================="
          echo "YOUR CLOUD PHONE IS READY!"
          echo "Connect via ADB using this address:"
          curl --silent http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///'
          echo "================================================="
          
          # Keep the script (and therefore the emulator) running for 4 hours
          sleep 14400
